services:
  elbe-dev:
    build:
      context: ../..
      dockerfile: tools/elbe-devcontainers/Dockerfile
      args:
        USERNAME: developer
        USER_UID: ${HOST_UID:-1000}
        USER_GID: ${HOST_GID:-1000}
    container_name: elbe-dev
    hostname: elbe-dev

    # KVM needed for QEMU/initvm
    privileged: true
    devices:
      - /dev/kvm:/dev/kvm

    volumes:
      # Mount the full workspace (toplevel) into /workspace
      - ../..:/workspace
      # Persistent VM and log data — survives docker compose down/up
      # Use 'docker compose down -v' for a full reset
      - elbe-vms:/workspace/.elbe/vms
      - elbe-logs:/workspace/.elbe/logs

    ports:
      # ELBE initvm SOAP/XML-RPC communication port
      - "7587:7587"
      # ELBE UI web interface
      - "8383:8080"

    stdin_open: true
    tty: true
    restart: unless-stopped

    networks:
      - elbe-net

volumes:
  elbe-vms:
    name: elbe-vms
  elbe-logs:
    name: elbe-logs

networks:
  elbe-net:
    driver: bridge
    ipam:
      config:
        # Use a subnet that does NOT conflict with corporate VPN routes
        - subnet: 10.200.0.0/24
          gateway: 10.200.0.1
